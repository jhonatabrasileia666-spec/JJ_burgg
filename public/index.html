<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJ Burguer - Cardápio</title>
    <style>
        :root { color-scheme: light; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #ffffff !important; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 15px; padding-bottom: 140px; overflow-x: hidden; position: relative; }
        .app-container { width: 100%; max-width: 450px; position: relative; z-index: 1; }
        header { text-align: center; margin-bottom: 25px; }
        .logo-header { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid #ff6b00; margin-bottom: 10px; background: white; }
        h1 { font-size: 30px; font-weight: 900; color: #d35400 !important; text-transform: uppercase; }

        .banner-montar { background-color: #f4d03f !important; padding: 30px 20px; border-radius: 20px; text-align: center; box-shadow: 0 8px 20px rgba(244, 208, 63, 0.4); margin-bottom: 30px; text-decoration: none; display: block; }
        .banner-montar h2 { color: #2c3e50 !important; font-size: 22px; margin-bottom: 10px; font-weight: 900; }
        .banner-montar p { color: #555 !important; font-size: 14px; margin-bottom: 15px; font-weight: bold; }
        .btn-banner { display: inline-block; background: #ff6b00 !important; color: white !important; padding: 12px 25px; border-radius: 30px; font-weight: bold; text-transform: uppercase; }
        .titulo-secao { font-size: 20px; color: #333 !important; margin-bottom: 15px; border-bottom: 3px solid #f4d03f; display: inline-block; padding-bottom: 5px; }
        
        .card-lanche { background-color: #ffffff !important; border: 2px solid #f4f4f4; border-radius: 25px; padding: 20px; margin-bottom: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* A VITRINE ORIGINAL PARA OS CLÁSSICOS */
        .vitrine-hamburguer { background-color: #f4d03f !important; border-radius: 20px; padding: 40px 5px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; position: relative; }
        @keyframes respirar { 0% { transform: translateY(0px); } 50% { transform: translateY(-4px); } 100% { transform: translateY(0px); } }
        .mini-camada { width: 100%; height: 26px; display: flex; justify-content: center; align-items: center; position: relative; animation: respirar 3.5s ease-in-out infinite; }
        .mini-camada img { width: 140px; height: auto; position: relative; z-index: 10; }
        .mini-topo { margin-bottom: -6px; z-index: 12; } .mini-base { margin-top: -6px; z-index: 1; }
        .z-pepino { z-index: 8; } .z-queijo { z-index: 7; } .z-alface { z-index: 6; } .z-bacon { z-index: 5; } .z-carne { z-index: 4; }
        
        /* A VITRINE GIGANTE PARA OS DINÂMICOS (TAMANHO EXATO DO ADMIN 300x300) */
        .vitrine-dinamica { position: relative; width: 300px; height: 300px; background-color: #f4d03f !important; margin: 0 auto 20px auto; overflow: hidden; border-radius: 20px; }

        .card-lanche h3 { color: #333 !important; font-size: 22px; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
        .card-lanche p { color: #777 !important; font-size: 14px; line-height: 1.4; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px; }
        .preco-card { font-size: 20px; color: #27ae60 !important; font-weight: 900; }
        .btn-add { background: #ff6b00 !important; color: white !important; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px; }

        .btn-flutuante { position: fixed; left: 50%; transform: translateX(-50%); color: white !important; padding: 15px 30px; border-radius: 30px; font-weight: 900; font-size: 16px; border: none; cursor: pointer; z-index: 990; white-space: nowrap; transition: 0.3s; }
        #btnCarrinho { bottom: 20px; background-color: #27ae60 !important; display: none; }
        
        /* Modal básico */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center; z-index: 1000; padding:15px; }
        .modal-overlay.ativo { display: flex; }
        .modal-card { background: #ffffff !important; width:100%; max-width:400px; padding:20px; border-radius:15px; text-align: left; max-height: 90vh; overflow-y: auto; }
        .modal-card h2 { color: #333 !important; font-size: 20px; margin-bottom: 10px; border-bottom: 2px solid #f4d03f; padding-bottom: 5px; }
        .lista-itens { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .item-carrinho { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; color: #555 !important; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .btn-remover { background: #e74c3c !important; color: white !important; border: none; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-left: 10px; }
        .subtotal-texto { font-weight: 900; color: #27ae60 !important; font-size: 18px; text-align: right; margin-bottom: 15px; }
        input, select { width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; outline:none; }
        .btn-acao-modal { width: 100%; padding: 14px; font-size: 15px; border-radius: 6px; margin-top: 10px; border:none; font-weight:bold; cursor: pointer; color: white !important; }
        .btn-enviar-whats { background-color: #25d366 !important; } .btn-fechar { background-color: #95a5a6 !important; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <img src="logo.png" alt="Logo da Hamburgueria" class="logo-header">
            <h1>JJ_BURGUER</h1>
        </header>

        <a href="montar.html" class="banner-montar"><h2>Chef por um dia! 🍔</h2><p>Escolha ingredientes e monte do seu jeito.</p><div class="btn-banner">Montar Hambúrguer ➔</div></a>

        <div id="lanches-dinamicos-container"></div>

        <h2 class="titulo-secao">Nossos Clássicos</h2>

        <div class="card-lanche">
            <div class="vitrine-hamburguer">
                <div class="mini-camada mini-topo"><img src="pao_topo.png"></div>
                <div class="mini-camada z-queijo"><img src="queijo.png"></div>
                <div class="mini-camada z-alface"><img src="alface.png"></div>
                <div class="mini-camada z-carne"><img src="carne.png"></div>
                <div class="mini-camada mini-base"><img src="pao_base.png"></div>
            </div>
            <h3>Classic Burger</h3><p>Blend bovino 160g, queijo derretido e alface.</p>
            <div class="card-footer"><span class="preco-card" id="preco-classic">R$ 22,00</span><button class="btn-add" onclick="adicionarItemCardapio('Classic Burger', precosDinamicos['Classic Burger'], '')">Adicionar 🛒</button></div>
        </div>

        <div class="card-lanche">
            <div class="vitrine-hamburguer">
                <div class="mini-camada mini-topo"><img src="pao_topo.png"></div>
                <div class="mini-camada z-queijo"><img src="queijo.png"></div>
                <div class="mini-camada z-bacon"><img src="bacon.png"></div>
                <div class="mini-camada z-carne"><img src="carne.png"></div>
                <div class="mini-camada mini-base"><img src="pao_base.png"></div>
            </div>
            <h3>Bacon Master</h3><p>Blend 160g, queijo mussarela e muito bacon premium.</p>
            <div class="card-footer"><span class="preco-card" id="preco-bacon">R$ 27,00</span><button class="btn-add" onclick="adicionarItemCardapio('Bacon Master', precosDinamicos['Bacon Master'], '')">Adicionar 🛒</button></div>
        </div>
    </div>

    <button id="btnCarrinho" class="btn-flutuante" onclick="abrirCarrinho()">🛒 Ver Carrinho (<span id="qtdCart">0</span>) - R$ <span id="valorCart">0,00</span></button>

    <div id="modalPedido" class="modal-overlay">
        <div class="modal-card">
            <h2>Seu Pedido 🛒</h2>
            <div class="lista-itens" id="listaItensHTML"></div>
            <p class="subtotal-texto">Subtotal: R$ <span id="subtotalModal">0,00</span></p>
            <input type="text" id="txt-nome" placeholder="Digite seu nome completo">
            <input type="number" id="txt-telefone" placeholder="Telefone com DDD">
            <select id="select-entrega"><option value="Entrega">Delivery</option><option value="Retirada">Retirar no local</option></select>
            <input type="text" id="txt-endereco" placeholder="Endereço de Entrega (Se Delivery)">
            
            <button class="btn-acao-modal btn-enviar-whats" onclick="enviarPedidoFinal()">Concluir via WhatsApp 💬</button>
            <button class="btn-acao-modal btn-fechar" onclick="fecharModalCarrinho()">Continuar Comprando</button>
        </div>
    </div>

    <script>
        const API_URL = "https://jjburgg-jjburg.up.railway.app";
        let precosDinamicos = { 'Classic Burger': 22.00, 'Bacon Master': 27.00, 'O Monstrão': 32.50, 'Coca-Cola (Lata)': 6.00 };
        let carrinho = JSON.parse(localStorage.getItem('carrinho_jj')) || []; 

        async function carregarPrecosDoBanco() {
            try {
                const res = await fetch(API_URL + '/api/cardapio');
                const cardapio = await res.json();
                
                const lanchesDinamicosContainer = document.getElementById('lanches-dinamicos-container');
                lanchesDinamicosContainer.innerHTML = '';

                cardapio.forEach(item => {
                    precosDinamicos[item.nome] = parseFloat(item.preco);
                    if(item.nome === 'Classic Burger') document.getElementById('preco-classic').innerText = `R$ ${precosDinamicos[item.nome].toFixed(2).replace('.', ',')}`;
                    if(item.nome === 'Bacon Master') document.getElementById('preco-bacon').innerText = `R$ ${precosDinamicos[item.nome].toFixed(2).replace('.', ',')}`;

                    // REPRODUÇÃO EXATA DA SUA FÁBRICA
                    if(item.tipo === 'dinamico' && item.composicao) {
                        let composicaoArray = typeof item.composicao === 'string' ? JSON.parse(item.composicao) : item.composicao;
                        let pilhasHTML = '';
                        
                        // Ele lê as posições absolutas que você arrastou (top, left)
                        composicaoArray.forEach(camada => {
                            pilhasHTML += `
                                <div style="position: absolute; top: ${camada.top}; left: ${camada.left}; z-index: ${camada.zIndex}; width: 140px; animation: respirar 3.5s ease-in-out infinite;">
                                    <img src="${API_URL}/${camada.img}" style="width: 100%; display: block;">
                                </div>
                            `;
                        });

                        lanchesDinamicosContainer.innerHTML += `
                            <h2 class="titulo-secao" style="color: #27ae60 !important; border-bottom-color: #27ae60;">Novidade do Chef ⭐</h2>
                            <div class="card-lanche">
                                <div class="vitrine-dinamica">
                                    ${pilhasHTML}
                                </div>
                                <h3>${item.nome}</h3><p>${item.descricao || ''}</p>
                                <div class="card-footer">
                                    <span class="preco-card">R$ ${parseFloat(item.preco).toFixed(2).replace('.', ',')}</span>
                                    <button class="btn-add" onclick="adicionarItemCardapio('${item.nome}', ${item.preco}, '')">Adicionar 🛒</button>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch(e) {}
        }

        window.addEventListener('load', () => { carregarPrecosDoBanco(); atualizarCarrinhoUI(); });

        function adicionarItemCardapio(nome, preco, obs) { 
            carrinho.push({ nome: nome, preco: preco, obs: obs }); 
            localStorage.setItem('carrinho_jj', JSON.stringify(carrinho));
            atualizarCarrinhoUI(); alert('🍔 Adicionado ao Carrinho!');
        }

        function removerItem(i) { 
            carrinho.splice(i, 1); localStorage.setItem('carrinho_jj', JSON.stringify(carrinho));
            atualizarCarrinhoUI(); if(carrinho.length === 0) { fecharModalCarrinho(); } else { abrirCarrinho(); }
        }

        function atualizarCarrinhoUI() {
            const btnCart = document.getElementById('btnCarrinho'); const qtdCart = document.getElementById('qtdCart'); const valorCart = document.getElementById('valorCart');
            if (carrinho.length > 0) btnCart.style.display = 'block'; else btnCart.style.display = 'none';
            qtdCart.textContent = carrinho.length; let total = 0; carrinho.forEach(item => total += parseFloat(item.preco) || 0);
            valorCart.textContent = total.toFixed(2).replace('.', ',');
        }

        function abrirCarrinho() {
            const modal = document.getElementById('modalPedido'); const listaHTML = document.getElementById('listaItensHTML'); const subtotalModal = document.getElementById('subtotalModal');
            listaHTML.innerHTML = ""; let total = 0;
            carrinho.forEach((item, index) => {
                total += parseFloat(item.preco) || 0; let detalheObs = item.obs ? `<span class="obs-item">Obs: ${item.obs}</span>` : "";
                listaHTML.innerHTML += `<div class="item-carrinho"><div>1x ${item.nome} ${detalheObs}</div><div style="display:flex; align-items:center;">R$ ${parseFloat(item.preco || 0).toFixed(2).replace('.', ',')} <button class="btn-remover" onclick="removerItem(${index})">X</button></div></div>`;
            });
            subtotalModal.textContent = total.toFixed(2).replace('.', ','); modal.classList.add('ativo');
        }

        function fecharModalCarrinho() { document.getElementById('modalPedido').classList.remove('ativo'); }

        async function enviarPedidoFinal() {
            const nome = document.getElementById('txt-nome').value.trim(); const tel = document.getElementById('txt-telefone').value.trim(); const tipoEntrega = document.getElementById('select-entrega').value; const endereco = document.getElementById('txt-endereco').value.trim();
            if (carrinho.length === 0 || !nome || !tel) { alert('Preencha os dados.'); return; }
            let subtotal = 0; let itensLimpos = carrinho.map(item => { let precoSeguro = parseFloat(item.preco) || 0; subtotal += precoSeguro; return { nome: String(item.nome || "Item"), preco: precoSeguro, obs: item.obs ? String(item.obs) : "" }; });
            let taxaEntrega = tipoEntrega === 'Entrega' ? 5.00 : 0.00; let totalFinal = subtotal + taxaEntrega;
            
            try {
                const botao = document.querySelector('.btn-enviar-whats'); botao.innerHTML = '⏳ Salvando...'; botao.disabled = true;
                await fetch(API_URL + '/api/pedidos', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nome: nome, telefone: tel, itens: itensLimpos, total: parseFloat(totalFinal.toFixed(2)), endereco: tipoEntrega === 'Entrega' ? endereco : "Retirada na Loja" }) });
            } catch(e) {}

            let textoWhats = `*🍔 NOVO PEDIDO* \n*Cliente:* ${nome}\n*Telefone:* ${tel}\n*Método:* ${tipoEntrega}\n`;
            if(tipoEntrega === 'Entrega' && endereco) textoWhats += `*Endereço:* ${endereco}\n`;
            textoWhats += `\n*🧾 O PEDIDO:*\n`;
            itensLimpos.forEach(item => { textoWhats += ` - 1x ${item.nome} (R$ ${item.preco.toFixed(2).replace('.', ',')})\n`; });
            textoWhats += `\n*TOTAL:* R$ ${totalFinal.toFixed(2).replace('.', ',')}`;
            window.open(`https://wa.me/5568992365649?text=${encodeURIComponent(textoWhats)}`, '_blank');
            setTimeout(() => { carrinho = []; localStorage.removeItem('carrinho_jj'); atualizarCarrinhoUI(); fecharModalCarrinho(); }, 1000);
        }
    </script>
</body>
</html>
